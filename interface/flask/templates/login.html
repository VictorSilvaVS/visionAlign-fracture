<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Registro - VisionAlign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuração do Tailwind para modo escuro e cores customizadas
        tailwind.config = {
            darkMode: 'class', // Habilita o modo escuro baseado em classe no <html>
            theme: {
                extend: {
                    colors: {
                        primary: { // Mantendo suas cores primárias, se usadas no light mode
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                            500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e',
                        },
                        dark: { // Cores do tema escuro do template
                            900: '#0a0a0a', 800: '#1a1a1a', 700: '#2a2a2a', 600: '#3a3a3a', 500: '#4a4a4a',
                        }
                    },
                    boxShadow: { // Sombras do tema escuro do template
                        'neumorph': '8px 8px 16px #0a0a0a, -8px -8px 16px #1a1a1a',
                        'neumorph-inset': 'inset 4px 4px 8px #0a0a0a, inset -4px -4px 8px #1a1a1a',
                        'neumorph-sm': '4px 4px 8px #0a0a0a, -4px -4px 8px #1a1a1a',
                        'glow': '0 0 15px rgba(14, 165, 233, 0.5)'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            perspective: 1000px;
        }

        .auth-form {
            transition: all 0.6s ease;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }

        .login-form {
            transform: rotateY(0deg);
        }

        .register-form {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Garante que o formulário de registro ocupe o espaço */
            transform: rotateY(180deg);
            opacity: 0;
        }

        .show-register .login-form {
            transform: rotateY(-180deg);
            opacity: 0;
        }

        .show-register .register-form {
            transform: rotateY(0deg);
            opacity: 1;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #9CA3AF;
            /* Cinza Tailwind 400 */
        }

        .input-group input {
            padding-left: 40px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Roxo/Azul gradiente */
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.6);
        }

        .social-btn {
            transition: all 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-2px);
        }

        /* Estilos do Modo Escuro Simplificados */
        html.dark body {
            background-color: #111827 !important;
            /* Equivalente a bg-gray-900 */
            color: #d1d5db !important;
            /* Equivalente a text-gray-300 */
        }

        html.dark .auth-form {
            background-color: #1f2937 !important;
            /* Equivalente a bg-gray-800 */
            /* Mantém a sombra original, mas pode precisar de ajuste se não ficar bom no escuro */
        }

        /* Cores de texto gerais para modo escuro */
        html.dark .text-gray-800 {
            color: #e5e7eb !important;
        }

        html.dark .text-gray-600 {
            color: #9ca3af !important;
        }

        html.dark .text-gray-700 {
            color: #d1d5db !important;
        }

        html.dark .text-gray-500 {
            color: #6b7280 !important;
        }

        html.dark .text-gray-400 {
            color: #9ca3af !important;
        }

        html.dark .input-group input {
            background-color: #374151 !important;
            border-color: #4b5563 !important;
            color: #e5e7eb !important;
        }

        html.dark .input-group input::placeholder {
            color: #9ca3af;
        }

        html.dark .input-group input:focus {
            border-color: #a78bfa !important;
            --tw-ring-color: #a78bfa !important;
        }

        html.dark .input-group i {
            color: #9ca3af;
        }

        html.dark .btn-primary {
            color: white !important;
        }

        html.dark .social-btn {
            background-color: #374151 !important;
            color: white !important;
            border: 1px solid #4b5563;
        }

        html.dark .social-btn.bg-blue-600:hover {
            background-color: #2563eb !important;
        }

        html.dark .social-btn.bg-red-600:hover {
            background-color: #dc2626 !important;
        }

        html.dark .social-btn.bg-gray-800:hover {
            background-color: #1f2937 !important;
        }

        html.dark input[type="checkbox"].text-purple-600 {
            border-color: #6b7280 !important;
            background-color: #374151 !important;
        }

        html.dark input[type="checkbox"].text-purple-600:checked {
            background-color: #8b5cf6 !important;
            border-color: #8b5cf6 !important;
        }

        html.dark a.text-purple-600 {
            color: #a78bfa !important;
        }

        html.dark a.text-purple-600:hover {
            color: #c4b5fd !important;
        }

        html.dark div.bg-red-100 {
            background-color: #450a0a !important;
            border-color: #c53030 !important;
            color: #fecaca !important;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="auth-container w-full max-w-md">
        <!-- Formulário de Login -->
        <div class="auth-form login-form bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800">Bem-vindo de volta</h2>
                    <p class="text-gray-600 mt-2">Faça login para acessar sistema VisionAlign</p>
                </div>

                <form id="loginForm" method="POST" action="{{ url_for('login_page') }}">
                    {% if error %}
                    <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm">
                        <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
                    </div>
                    {% endif %}
                    <div id="login-client-error" class="mb-4 text-sm" style="display: none;"></div>
                    <div class="input-group mb-4">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Matricula" required
                            value="{{ last_username if last_username else '' }}"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="input-group mb-6">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Senha"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="remember-me" name="remember-me" {% if last_remember %}checked{%
                                endif %} class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
                            <span class="ml-2 text-sm text-gray-700">Lembrar-me</span>
                        </label>
                        <a href="{{ url_for('forgot_password') }}"
                            class="text-sm text-purple-600 hover:text-purple-800 font-bold">Esqueceu a senha?</a>
                    </div>
                    <button type="submit"
                        class="btn-primary w-full py-3 px-4 text-white font-semibold rounded-lg shadow mb-6">
                        Entrar
                    </button>
                    <div class="text-center text-sm text-gray-600">
                        Não tem uma conta?
                        <a href="#" id="show-register"
                            class="text-purple-600 font-medium hover:text-purple-800 transition-colors">Registre-se</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Formulário de Registro -->
        <div class="auth-form register-form bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800">Crie sua conta</h2>
                    <p class="text-gray-600 mt-2">Preencha os campos para se registrar</p>
                </div>
                <div id="register-message" class="mb-4 text-sm"></div>

                <form id="registrationForm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="register-nome" placeholder="Nome" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="register-sobrenome" placeholder="Sobrenome" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                        </div>
                    </div>
                    <div class="input-group mb-4">
                        <i class="fas fa-address-card"></i>
                        <input type="text" id="register-matricula" placeholder="Matricula" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="input-group mb-4">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="Email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="input-group mb-4">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-password" placeholder="Senha" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="input-group mb-6">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-confirm-password" placeholder="Confirmar Senha" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                    <div class="mb-6">
                        <label class="flex items-start">
                            <input type="checkbox" id="register-terms" required
                                class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded mt-1">
                            <span class="ml-2 text-gray-700 text-sm">
                                Eu concordo com os <a href="#" class="text-purple-600 hover:text-purple-800">Termos de
                                    Serviço</a> e <a href="#" class="text-purple-600 hover:text-purple-800">Política de
                                    Privacidade</a>
                            </span>
                        </label>
                    </div>
                    <button type="submit" id="register-button"
                        class="btn-primary w-full py-3 px-4 text-white font-semibold rounded-lg shadow mb-6">
                        Registrar
                    </button>
                    <div class="text-center text-sm text-gray-600">
                        Já tem uma conta?
                        <a href="#" id="show-login"
                            class="text-purple-600 font-medium hover:text-purple-800 transition-colors">Faça login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal para Sessão Duplicada -->
    <div id="duplicateSessionModal"
        class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center"
        style="display: none; z-index: 100;">
        <div class="relative mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white dark:bg-gray-800">
            <div class="mt-3 text-center">
                <div
                    class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-yellow-100 dark:bg-yellow-700">
                    <i class="fas fa-exclamation-triangle text-yellow-600 dark:text-yellow-300 text-2xl"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100 mt-2">Sessão Ativa Detectada
                </h3>
                <div class="mt-2 px-7 py-3">
                    <p id="duplicateSessionMessage" class="text-sm text-gray-500 dark:text-gray-400"></p>
                </div>
                <div class="items-center px-4 py-3 space-y-2 sm:space-y-0 sm:flex sm:space-x-2">
                    <button id="forceLoginBtn"
                        class="w-full sm:w-auto px-4 py-2 bg-red-600 text-white text-base font-medium rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500">
                        Entrar e Deslogar Outra Sessão
                    </button>
                    <button id="cancelLoginBtn"
                        class="w-full sm:w-auto mt-2 sm:mt-0 px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 text-base font-medium rounded-md shadow-sm hover:bg-gray-300 dark:hover:bg-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-400">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
            (function () {
                if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            })();

        document.addEventListener('DOMContentLoaded', function () {
            const authContainer = document.querySelector('.auth-container');
            const showRegisterLink = document.getElementById('show-register');
            const showLoginLink = document.getElementById('show-login');

            showRegisterLink.addEventListener('click', function (e) {
                e.preventDefault();
                authContainer.classList.add('show-register');
            });

            showLoginLink.addEventListener('click', function (e) {
                e.preventDefault();
                authContainer.classList.remove('show-register');
            });

            const loginForm = document.getElementById('loginForm');
            const loginClientErrorDiv = document.getElementById('login-client-error');

            if (loginForm) {
                loginForm.addEventListener('submit', function (event) {
                    const usernameInput = document.getElementById('username');
                    const passwordInput = document.getElementById('password');
                    let isValid = true;
                    let clientErrorMessage = '';

                    loginClientErrorDiv.style.display = 'none';
                    loginClientErrorDiv.textContent = '';
                    loginClientErrorDiv.className = 'mb-4 text-sm';

                    if (!usernameInput.value.trim()) {
                        isValid = false;
                        clientErrorMessage = 'O campo Matrícula é obrigatório.';
                    }

                    // Somente exige senha se NÃO for um force logout (que usamos a sessão)
                    const isForceLogout = document.getElementsByName('force_logout_username').length > 0;
                    if (!isForceLogout && !passwordInput.value.trim()) {
                        isValid = false;
                        clientErrorMessage = clientErrorMessage ? clientErrorMessage + '<br>O campo Senha é obrigatório.' : 'O campo Senha é obrigatório.';
                    }

                    if (!isValid) {
                        event.preventDefault();
                        loginClientErrorDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i>${clientErrorMessage}`;
                        loginClientErrorDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        loginClientErrorDiv.style.display = 'block';
                    }
                });
            }

            const registrationForm = document.getElementById('registrationForm');
            const registerButton = document.getElementById('register-button');
            const registerMessageDiv = document.getElementById('register-message');

            if (registrationForm) {
                registrationForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    registerMessageDiv.textContent = '';
                    registerMessageDiv.className = 'mb-4 text-sm';

                    const nome = document.getElementById('register-nome').value;
                    const sobrenome = document.getElementById('register-sobrenome').value;
                    const matricula = document.getElementById('register-matricula').value;
                    const email = document.getElementById('register-email').value;
                    const password = document.getElementById('register-password').value;
                    const confirmPassword = document.getElementById('register-confirm-password').value;
                    const termsAccepted = document.getElementById('register-terms').checked;

                    if (!matricula.startsWith("104") || matricula.length !== 8 || !/^\d+$/.test(matricula)) {
                        registerMessageDiv.textContent = 'Matrícula inválida. tente novamente.';
                        registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        return;
                    }

                    if (!email.endsWith("@canpack.com")) {
                        registerMessageDiv.textContent = 'Email inválido. verfique a ortografia.';
                        registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        return;
                    }

                    if (password !== confirmPassword) {
                        registerMessageDiv.textContent = 'As senhas não coincidem.';
                        registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        return;
                    }

                    if (!termsAccepted) {
                        registerMessageDiv.textContent = 'Você deve aceitar os Termos de Serviço e Política de Privacidade.';
                        registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        return;
                    }

                    registerButton.disabled = true;
                    registerButton.textContent = 'Registrando...';

                    try {
                        const response = await fetch("{{ url_for('api_register') }}", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ nome, sobrenome, matricula, email, password, confirm_password: confirmPassword })
                        });

                        const data = await response.json();

                        if (response.ok && data.success) {
                            registerMessageDiv.textContent = data.message + " Você será redirecionado para o login.";
                            registerMessageDiv.classList.add('p-3', 'bg-green-100', 'border', 'border-green-400', 'text-green-700', 'rounded-lg');
                            setTimeout(() => {
                                authContainer.classList.remove('show-register');
                                registrationForm.reset();
                            }, 3000);
                        } else {
                            registerMessageDiv.textContent = data.message || 'Erro ao registrar. Tente novamente.';
                            registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                        }
                    } catch (error) {
                        registerMessageDiv.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.';
                        registerMessageDiv.classList.add('p-3', 'bg-red-100', 'border', 'border-red-400', 'text-red-700', 'rounded-lg');
                    } finally {
                        registerButton.disabled = false;
                        registerButton.textContent = 'Registrar';
                    }
                });
            }

            const duplicateSessionModal = document.getElementById('duplicateSessionModal');
            const duplicateSessionMessageEl = document.getElementById('duplicateSessionMessage');
            const forceLoginBtn = document.getElementById('forceLoginBtn');
            const cancelLoginBtn = document.getElementById('cancelLoginBtn');

            // Renderização direta do Jinja sem quebra de linha para evitar erro de lint
            const duplicateSessionData = {{ duplicate_session_info | tojson | safe
        }};

        if (duplicateSessionData && duplicateSessionData.message) {
            duplicateSessionMessageEl.innerHTML = duplicateSessionData.message + "<br><br>Deseja continuar e desconectar a outra sessão?";
            duplicateSessionModal.style.display = 'flex';

            forceLoginBtn.onclick = function () {
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = 'force_logout_username';
                hiddenInput.value = duplicateSessionData.username_in_conflict;
                loginForm.appendChild(hiddenInput);
                loginForm.submit();
                duplicateSessionModal.style.display = 'none';
            }

            cancelLoginBtn.onclick = function () {
                duplicateSessionModal.style.display = 'none';
            }
        }
        });
    </script>
</body>

</html>
