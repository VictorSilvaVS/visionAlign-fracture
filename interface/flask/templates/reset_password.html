<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - VisionAlign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.6);
        }

        html.dark body {
            background-color: #111827 !important;
            color: #d1d5db !important;
        }

        html.dark .form-card {
            background-color: #1f2937 !important;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="form-card bg-white rounded-xl shadow-2xl overflow-hidden p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800 dark:text-white">Nova Senha</h2>
                <p class="text-gray-600 dark:text-gray-400 mt-2">Escolha uma senha segura para sua conta.</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm text-center">
                <i class="fas fa-check-circle mr-2"></i>{{ success }}
            </div>
            <div class="text-center">
                <a href="{{ url_for('login_page') }}"
                    class="btn-primary inline-block py-3 px-6 text-white font-semibold rounded-lg shadow">Fazer
                    Login</a>
            </div>
            {% elif invalid %}
            <div class="text-center mt-4">
                <a href="{{ url_for('forgot_password') }}"
                    class="text-blue-600 hover:text-blue-800 font-medium">Solicitar novo link</a>
            </div>
            {% else %}
            <form method="POST">
                <div class="relative mb-4">
                    <i class="fas fa-lock absolute top-1/2 left-4 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" name="password" placeholder="Nova Senha" required
                        class="w-full pl-12 pr-4 py-3 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                </div>
                <div class="relative mb-6">
                    <i class="fas fa-lock absolute top-1/2 left-4 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Confirmar Nova Senha" required
                        class="w-full pl-12 pr-4 py-3 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                </div>
                <button type="submit" class="btn-primary w-full py-3 px-4 text-white font-semibold rounded-lg shadow">
                    Redefinir Senha
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</body>

</html>
